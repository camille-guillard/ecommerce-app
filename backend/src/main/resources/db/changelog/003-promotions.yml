databaseChangeLog:
  - changeSet:
      id: 003-create-promotions
      author: ecommerce
      changes:
        - createTable:
            tableName: promotions
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_promotion_product
                    references: products(id)
              - column:
                  name: discount_percent
                  type: decimal(5,2)
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: date

  - changeSet:
      id: 003-insert-promotions
      author: ecommerce
      comment: "Some permanent promos, some limited-time"
      changes:
