<div class="admin-page">
  <h1 class="admin-title">{{ 'admin.title' | translate }}</h1>
  <div class="admin-tabs">
    <button class="tab-btn" [class.active]="activeTab() === 'orders'" (click)="setTab('orders')">{{ 'admin.tabOrders' | translate }}</button>
    <button class="tab-btn" [class.active]="activeTab() === 'products'" (click)="setTab('products')">{{ 'admin.tabProducts' | translate }}</button>
    <button class="tab-btn" [class.active]="activeTab() === 'users'" (click)="setTab('users')">{{ 'admin.tabUsers' | translate }}</button>
  </div>

  @switch (activeTab()) {
    @case ('orders') { <app-admin-orders /> }
    @case ('products') { <app-admin-products /> }
    @case ('users') { <app-admin-users /> }
  }
</div>
