<div class="auth-page">
  <div class="auth-card">
    <h1>{{ 'auth.loginTitle' | translate }}</h1>

    @if (error()) {
      <div class="error-msg">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label for="username">{{ 'auth.username' | translate }}</label>
        <input id="username" type="text" [(ngModel)]="username" name="username" required autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="password">{{ 'auth.password' | translate }}</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required autocomplete="current-password" />
      </div>

      <button type="submit" class="submit-btn" [disabled]="loading() || !username || !password">
        @if (loading()) { {{ 'auth.loggingIn' | translate }} } @else { {{ 'auth.loginBtn' | translate }} }
      </button>
    </form>

    <p class="auth-link">{{ 'auth.noAccount' | translate }} <a routerLink="/register">{{ 'auth.createAccount' | translate }}</a></p>
  </div>
</div>
